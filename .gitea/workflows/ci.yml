name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: linux
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          git clone http://localhost:8070/symlabs-ai/forge_llm.git /tmp/ci-forge_llm
          pip install /tmp/ci-forge_llm
          pip install -e ".[dev]"

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check . || true

      - name: Test
        run: |
          . .venv/bin/activate
          pytest -x -q
