name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: linux
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          DEPS_DIR="/tmp/ci-deps-$$"
          CLONE_URL="http://token:${{ secrets.INTERNAL_CLONE_TOKEN }}@localhost:8070"
          python3 -m venv .venv
          . .venv/bin/activate
          mkdir -p "$DEPS_DIR"
          git clone "$CLONE_URL/symlabs-ai/forge_llm.git" "$DEPS_DIR/forge_llm"
          pip install "$DEPS_DIR/forge_llm"
          pip install -e ".[dev]"
          rm -rf "$DEPS_DIR"

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check . || true

      - name: Test
        run: |
          . .venv/bin/activate
          pytest -x -q --ignore=tests/e2e
